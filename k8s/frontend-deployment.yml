apiVersion: apps/v1                       # Kubernetes API version
kind: Deployment                          # Kubernetes resource
metadata:
  name: frontend                          # The name of this deployment
  namespace: patchwork                    # Must match the namespace of your Service so they can interact
spec:
  replicas: 3                             # Number of frontend Pods to run
  selector:
    matchLabels:
      app: patchwork-frontend             # Label selector determines which Pods this Deployment manages
  template:
    metadata:
      labels:
        app: patchwork-frontend           # Labels applied to the Pods created by this Deployment
    spec:
      containers:
        - name: frontend
          image: freddiec1212/skyhigh-patchwork-frontend:v1     # The Docker image to pull and run
          ports:
            - containerPort: 8080         # The port the container application listens on internally
          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config        # Looks for a ConfigMap named 'app-config'
                  key: BACKEND_URL        # Pulls the value associated with this key
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret        # Looks for a Secret named 'app-secret'
                  key: API_KEY            # Pulls the value associated with this key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health               # The app's health check endpoint
              port: 8080
            initialDelaySeconds: 3        # Wait 3 seconds after starting before checking
            periodSeconds: 5              # Re-check every 5 seconds
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10       # Wait 10 seconds after starting before checking
            periodSeconds: 10             # Re-check every 10 seconds
            failureThreshold: 3           # Must fail 3 consecutive times before restarting the Pod